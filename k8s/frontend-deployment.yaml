apiVersion: apps/v1
kind: Deployment
metadata:
  name: kot-frontend
  labels:
    app: kot-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kot-frontend
  template:
    metadata:
      labels:
        app: kot-frontend
    spec:
      containers:
      - name: frontend
        image: navenkumar68/smart-kot-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
